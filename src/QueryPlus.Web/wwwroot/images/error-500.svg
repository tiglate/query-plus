<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="t500 d500">
  <title id="t500">500 — server error</title>
  <desc id="d500">A tired server rack with smoke and a coffee mug, having a rough day.</desc>
  <defs>
    <linearGradient id="sky500" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dee76c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1c334d" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="rack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c334d"/>
      <stop offset="100%" stop-color="#0c1626"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" rx="28" fill="url(#sky500)"/>

  <!-- Soft 500 watermark -->
  <text x="320" y="175" text-anchor="middle" font-family="Inter,Segoe UI,system-ui,sans-serif"
        font-size="130" font-weight="800" fill="#1c334d" opacity="0.07">500</text>

  <!-- Server rack -->
  <g transform="translate(180 110)">
    <rect x="0" y="20" width="200" height="240" rx="16" fill="url(#rack)"/>
    <rect x="14" y="40" width="172" height="40" rx="8" fill="#122033" stroke="#4777a7" stroke-width="2"/>
    <rect x="14" y="96" width="172" height="40" rx="8" fill="#122033" stroke="#4777a7" stroke-width="2"/>
    <rect x="14" y="152" width="172" height="40" rx="8" fill="#122033" stroke="#4777a7" stroke-width="2"/>
    <rect x="14" y="208" width="172" height="32" rx="8" fill="#122033" stroke="#4777a7" stroke-width="2"/>
    <!-- LEDs: mostly red, one hopeful cyan -->
    <circle cx="36" cy="60" r="6" fill="#ef4444"/>
    <circle cx="56" cy="60" r="6" fill="#ef4444"/>
    <circle cx="76" cy="60" r="6" fill="#21bbee"/>
    <circle cx="36" cy="116" r="6" fill="#ef4444"/>
    <circle cx="56" cy="116" r="6" fill="#f59e0b"/>
    <circle cx="36" cy="172" r="6" fill="#ef4444"/>
    <circle cx="56" cy="172" r="6" fill="#ef4444"/>
    <!-- sad face on middle bay -->
    <circle cx="120" cy="116" r="3" fill="#94a3b8"/>
    <circle cx="140" cy="116" r="3" fill="#94a3b8"/>
    <path d="M118 130c6 6 18 6 24 0" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Smoke puffs -->
  <g fill="#94a3b8" opacity="0.55">
    <circle cx="250" cy="90" r="14"/>
    <circle cx="272" cy="72" r="18"/>
    <circle cx="298" cy="58" r="12"/>
    <circle cx="318" cy="44" r="16"/>
  </g>

  <!-- Coffee mug (coping mechanism) -->
  <g transform="translate(420 220)">
    <rect x="0" y="30" width="70" height="70" rx="10" fill="#ffffff" stroke="#1c334d" stroke-width="6"/>
    <path d="M70 48h18c10 0 18 8 18 18s-8 18-18 18H70" fill="none" stroke="#1c334d" stroke-width="6"/>
    <rect x="10" y="18" width="50" height="16" rx="4" fill="#21bbee"/>
    <path d="M22 8c0-10 12-10 12 0M36 6c0-12 14-12 14 2" fill="none" stroke="#a3bbd3" stroke-width="4" stroke-linecap="round"/>
    <text x="35" y="78" text-anchor="middle" font-family="Inter,Segoe UI,system-ui,sans-serif"
          font-size="22" font-weight="700" fill="#1c334d">404?</text>
  </g>

  <!-- Wrench on the floor -->
  <g transform="translate(430 320) rotate(-25)">
    <rect x="0" y="10" width="70" height="14" rx="7" fill="#7599bd"/>
    <circle cx="8" cy="17" r="14" fill="none" stroke="#1c334d" stroke-width="8"/>
    <rect x="60" y="4" width="22" height="26" rx="4" fill="#1c334d"/>
  </g>

  <ellipse cx="320" cy="380" rx="210" ry="16" fill="#1c334d" opacity="0.08"/>
</svg>
