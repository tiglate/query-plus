<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-labelledby="supportTitle supportDesc">
  <title id="supportTitle">Support illustration</title>
  <desc id="supportDesc">Stylized help desk and support workspace scene.</desc>
  <!-- Original QueryPlus illustration (free to use with the app). Palette: navy + cyan. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#21bbee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1c334d" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1dde9"/>
      <stop offset="100%" stop-color="#a3bbd3"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c334d"/>
      <stop offset="100%" stop-color="#122033"/>
    </linearGradient>
  </defs>

  <rect width="640" height="480" rx="24" fill="url(#bg)"/>

  <!-- Soft floor shadow -->
  <ellipse cx="320" cy="400" rx="210" ry="28" fill="#1c334d" opacity="0.08"/>

  <!-- Desk -->
  <rect x="120" y="300" width="400" height="22" rx="6" fill="url(#desk)"/>
  <rect x="150" y="322" width="18" height="70" rx="4" fill="#7599bd"/>
  <rect x="472" y="322" width="18" height="70" rx="4" fill="#7599bd"/>

  <!-- Monitor -->
  <rect x="210" y="150" width="220" height="140" rx="10" fill="url(#screen)"/>
  <rect x="222" y="162" width="196" height="110" rx="6" fill="#0c1626"/>
  <!-- Screen content -->
  <rect x="236" y="178" width="90" height="10" rx="3" fill="#21bbee" opacity="0.9"/>
  <rect x="236" y="198" width="160" height="8" rx="2" fill="#4777a7"/>
  <rect x="236" y="214" width="140" height="8" rx="2" fill="#4777a7" opacity="0.75"/>
  <rect x="236" y="230" width="120" height="8" rx="2" fill="#4777a7" opacity="0.55"/>
  <circle cx="380" cy="240" r="18" fill="#21bbee" opacity="0.25"/>
  <path d="M372 240h16M380 232v16" stroke="#21bbee" stroke-width="3" stroke-linecap="round"/>
  <!-- Stand -->
  <rect x="300" y="290" width="40" height="12" rx="3" fill="#7599bd"/>
  <rect x="285" y="300" width="70" height="8" rx="3" fill="#a3bbd3"/>

  <!-- Headset (left of monitor) -->
  <path d="M155 210c0-28 22-50 50-50s50 22 50 50" fill="none" stroke="#1c334d" stroke-width="10" stroke-linecap="round"/>
  <rect x="145" y="205" width="22" height="36" rx="8" fill="#21bbee"/>
  <rect x="243" y="205" width="22" height="36" rx="8" fill="#21bbee"/>
  <path d="M155 240c8 18 28 28 50 20" fill="none" stroke="#1c334d" stroke-width="6" stroke-linecap="round"/>
  <circle cx="210" cy="262" r="8" fill="#1c334d"/>

  <!-- Chat bubbles (right) -->
  <g transform="translate(430 120)">
    <rect x="0" y="20" width="120" height="52" rx="14" fill="#ffffff" stroke="#a3bbd3" stroke-width="2"/>
    <circle cx="28" cy="46" r="5" fill="#21bbee"/>
    <circle cx="48" cy="46" r="5" fill="#9fcd6b"/>
    <circle cx="68" cy="46" r="5" fill="#dee76c"/>
    <path d="M24 72l12-10h0" fill="#ffffff" stroke="#a3bbd3" stroke-width="2"/>
  </g>
  <g transform="translate(455 185)">
    <rect x="0" y="0" width="100" height="44" rx="12" fill="#21bbee"/>
    <rect x="16" y="14" width="52" height="6" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="16" y="26" width="36" height="6" rx="2" fill="#ffffff" opacity="0.65"/>
  </g>

  <!-- Life ring accent (bottom right) -->
  <g transform="translate(500 330)">
    <circle cx="40" cy="40" r="34" fill="none" stroke="#21bbee" stroke-width="12"/>
    <circle cx="40" cy="40" r="34" fill="none" stroke="#1c334d" stroke-width="12" stroke-dasharray="18 38" stroke-linecap="butt"/>
    <circle cx="40" cy="40" r="16" fill="none" stroke="#e8eef4" stroke-width="6"/>
  </g>

  <!-- Plant (left) -->
  <rect x="168" y="268" width="28" height="32" rx="4" fill="#7599bd"/>
  <ellipse cx="182" cy="252" rx="18" ry="22" fill="#9fcd6b"/>
  <ellipse cx="168" cy="258" rx="12" ry="16" fill="#86b851"/>
  <ellipse cx="196" cy="258" rx="12" ry="16" fill="#86b851"/>
</svg>
