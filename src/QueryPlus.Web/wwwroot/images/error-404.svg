<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="t404 d404">
  <title id="t404">404 — page not found</title>
  <desc id="d404">A confused magnifying glass looking for a missing page among empty folders.</desc>
  <defs>
    <linearGradient id="sky404" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#21bbee" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#1c334d" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" rx="28" fill="url(#sky404)"/>

  <!-- Big soft 404 -->
  <text x="320" y="175" text-anchor="middle" font-family="Inter,Segoe UI,system-ui,sans-serif"
        font-size="140" font-weight="800" fill="#1c334d" opacity="0.08">404</text>

  <!-- Empty folders -->
  <g transform="translate(90 210)">
    <path d="M8 28h96l-10 72H18z" fill="#a3bbd3"/>
    <path d="M8 28h36l10 12h50v-12" fill="none" stroke="#7599bd" stroke-width="6" stroke-linejoin="round"/>
    <path d="M28 52h56M28 68h40" stroke="#1c334d" stroke-opacity="0.25" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(200 230)">
    <path d="M8 28h96l-10 72H18z" fill="#d1dde9"/>
    <path d="M8 28h36l10 12h50v-12" fill="none" stroke="#a3bbd3" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- Confused magnifying glass character -->
  <g transform="translate(360 95)">
    <!-- glass -->
    <circle cx="90" cy="90" r="70" fill="#ffffff" stroke="#1c334d" stroke-width="10"/>
    <circle cx="90" cy="90" r="54" fill="#e9f8fd"/>
    <!-- question marks inside -->
    <text x="90" y="108" text-anchor="middle" font-family="Inter,Segoe UI,system-ui,sans-serif"
          font-size="64" font-weight="700" fill="#21bbee">?</text>
    <!-- handle -->
    <rect x="138" y="138" width="22" height="90" rx="11" fill="#1c334d"
          transform="rotate(40 149 183)"/>
    <!-- sweat drop -->
    <ellipse cx="40" cy="48" rx="8" ry="12" fill="#21bbee" opacity="0.55"/>
  </g>

  <!-- Tiny lost cursor -->
  <g transform="translate(520 300)">
    <path d="M0 0l0 36 8-8 8 16 8-4-8-16 12-2z" fill="#1c334d"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="320" cy="370" rx="200" ry="18" fill="#1c334d" opacity="0.08"/>
</svg>
