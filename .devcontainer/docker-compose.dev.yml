services:
  app:
    image: mcr.microsoft.com/devcontainers/dotnet:1-10.0
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=QueryPlus;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;Encrypt=False"
      # Browser-facing issuer (host machine resolves localhost:8080 via port publish).
      Keycloak__Authority: "http://localhost:8080/realms/queryplus"
      # Container fetches OIDC discovery over the Docker network.
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/queryplus/.well-known/openid-configuration"
      # Rewrite localhost back-channel calls (token/JWKS) to the Keycloak service.
      Keycloak__BackchannelHost: "keycloak"
      Keycloak__BackchannelPort: "8080"
      Keycloak__ClientId: "queryplus-web"
      Keycloak__ClientSecret: "change-me-in-production"
      Keycloak__RequireHttpsMetadata: "false"
    depends_on:
      - sqlserver
      - keycloak
    ports:
      - "5000:5000"

  keycloak:
    # Ensure issuer / authorize URLs advertised to browsers use localhost, not "keycloak".
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
