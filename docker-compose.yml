services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: queryplus-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Password123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your_strong_Password123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: queryplus-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: queryplus-web
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=QueryPlus;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;Encrypt=False"
      Keycloak__Authority: "http://localhost:8080/realms/queryplus"
      Keycloak__ClientId: "queryplus-web"
      Keycloak__ClientSecret: "change-me-in-production"
      Keycloak__RequireHttpsMetadata: "false"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      keycloak:
        condition: service_started
    profiles:
      - full

volumes:
  sqlserver_data:
